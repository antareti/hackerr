<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER.RU - Кибербезопасность</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#00ff88;
--secondary:#00ccff;
--bg-dark:#0a0a0f;
--bg-card:#12121a;
--text-primary:#fff;
--text-secondary:#888899;
}

body{
font-family:'JetBrains Mono',monospace;
background:var(--bg-dark);
color:var(--text-primary);
overflow-x:hidden;
line-height:1.6;
}

.container{max-width:1200px;margin:0 auto;padding:0 20px;}

header{
padding:20px 0;
position:fixed;
width:100%;
top:0;
z-index:1000;
background:rgba(10,10,15,0.95);
border-bottom:1px solid rgba(0,255,136,0.1);
}

nav{display:flex;justify-content:space-between;align-items:center;}

.logo{
font-size:24px;
font-weight:700;
color:var(--primary);
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:40px;height:40px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
border-radius:8px;
display:flex;align-items:center;justify-content:center;
}

.nav-links{display:flex;gap:30px;list-style:none;}

.nav-links a{
color:var(--text-secondary);
text-decoration:none;
transition:0.3s;
}

.nav-links a:hover{color:var(--primary);}

.btn{
padding:12px 24px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:#000;
border:none;
border-radius:6px;
font-weight:700;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:0.3s;
}

.btn:hover{transform:translateY(-2px);}

.hero{
min-height:100vh;
display:flex;
align-items:center;
padding-top:120px;
}

.hero h1{
font-size:42px;
margin-bottom:20px;
}

.hero h1 span{color:var(--primary);}

.hero p{
color:var(--text-secondary);
margin-bottom:30px;
}

section{padding:100px 0;}

.features,
.contact{background:var(--bg-card);}

.section-title{text-align:center;margin-bottom:60px;}
.section-title span{color:var(--primary);}

.features-grid,
.services-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:var(--bg-dark);
padding:30px;
border-radius:12px;
border:1px solid rgba(0,255,136,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--primary);
}

.stats{
background:linear-gradient(135deg,rgba(0,255,136,0.05),rgba(0,204,255,0.05));
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:40px;
text-align:center;
}

.stat-item h3{
font-size:48px;
color:var(--primary);
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:15px;
background:var(--bg-dark);
border:1px solid rgba(0,255,136,0.2);
border-radius:8px;
color:#fff;
margin-bottom:20px;
}

footer{
padding:40px 0;
text-align:center;
border-top:1px solid rgba(255,255,255,0.1);
color:var(--text-secondary);
}

@media(max-width:768px){
.nav-links{display:none;}
.contact-grid{grid-template-columns:1fr;}
.hero{text-align:center;}
}
</style>
</head>

<body>

<header>
<div class="container">
<nav>
<a href="#" class="logo">
<div class="logo-icon">⚡</div>
HACKER.RU
</a>
<ul class="nav-links">
<li><a href="#features">Возможности</a></li>
<li><a href="#services">Услуги</a></li>
<li><a href="#stats">Статистика</a></li>
<li><a href="#contact">Контакты</a></li>
</ul>
<a href="#contact" class="btn">Начать</a>
</nav>
</div>
</header>

<section class="hero">
<div class="container">
<h1>Защита ваших <span>цифровых активов</span></h1>
<p>Профессиональные решения в области кибербезопасности.</p>
<a href="#contact" class="btn">Получить консультацию</a>
</div>
</section>

<section class="stats" id="stats">
<div class="container">
<div class="stats-grid">
<div class="stat-item"><h3 id="stat1">0</h3><p>Компаний</p></div>
<div class="stat-item"><h3 id="stat2">0</h3><p>Атак</p></div>
<div class="stat-item"><h3 id="stat3">0</h3><p>Лет опыта</p></div>
</div>
</div>
</section>

<section class="contact" id="contact">
<div class="container">
<div class="contact-grid">
<div>
<h3>Свяжитесь с нами</h3>
<p>Email: packhack1977@gmail.com</p>
</div>
<form class="contact-form">
<input type="text" placeholder="Ваше имя" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Сообщение" required></textarea>
<button class="btn">Отправить</button>
</form>
</div>
</div>
</section>

<footer>
<p>© 2026 HACKER.RU</p>
</footer>

<script>
const stats=[
{id:'stat1',target:500},
{id:'stat2',target:10000},
{id:'stat3',target:9}
];

function animateStats(){
stats.forEach(stat=>{
let current=0;
const el=document.getElementById(stat.id);
const inc=stat.target/100;
const timer=setInterval(()=>{
current+=inc;
if(current>=stat.target){
current=stat.target;
clearInterval(timer);
}
el.textContent=Math.floor(current);
},20);
});
}

window.addEventListener("load",animateStats);
</script>

</body>
</html>
